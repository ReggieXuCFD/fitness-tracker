<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<title>我的健身记录</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#232732; --line:#2b2f3a;
    --text:#e8eaf0; --sub:#9aa3b2; --accent:#4f9cf9; --green:#36c275;
    --red:#ff5b5b; --warn:#f5a623; --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%}
  .app{max-width:640px;margin:0 auto;padding:0 14px 96px}
  header{position:sticky;top:0;z-index:20;background:rgba(15,17,21,.92);
    backdrop-filter:blur(8px);padding:14px 0 10px;border-bottom:1px solid var(--line)}
  .h-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  h1{font-size:19px;margin:0;font-weight:700}
  .date-pick{display:flex;align-items:center;gap:6px;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:6px 10px}
  .date-pick input{background:transparent;border:none;color:var(--text);font-size:15px;outline:none}
  .pill{font-size:12px;color:var(--sub);background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:4px 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-top:14px}
  .card h2{font-size:15px;margin:0 0 12px;font-weight:600;color:var(--sub)}
  label{display:block;font-size:13px;color:var(--sub);margin:0 0 6px}
  input,textarea,select{width:100%;background:var(--card2);border:1px solid var(--line);
    border-radius:10px;color:var(--text);font-size:16px;padding:11px 12px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:46px}
  .grid{display:grid;gap:10px}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .g2{grid-template-columns:1fr 1fr}
  .field{margin-bottom:12px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:none;border-radius:10px;font-size:15px;font-weight:600;padding:12px 14px;
    background:var(--accent);color:#fff;width:100%;cursor:pointer}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .btn.green{background:var(--green)}
  .btn.sm{width:auto;padding:8px 12px;font-size:13px}
  .btn.danger{background:transparent;color:var(--red);border:1px solid var(--line)}
  .row-actions{display:flex;gap:8px;margin-top:8px}
  .sets{margin-top:10px}
  .set-row{display:grid;grid-template-columns:30px 1fr 1fr 70px 32px;gap:8px;
    align-items:center;margin-bottom:8px}
  .set-row .idx{font-size:13px;color:var(--sub);text-align:center}
  .set-row input{padding:9px 8px;font-size:15px;text-align:center}
  .set-row .rest{font-size:12px}
  .x{background:transparent;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0}
  .add-set{font-size:13px;color:var(--accent);background:transparent;border:1px dashed var(--line);
    border-radius:8px;padding:8px;width:100%;cursor:pointer;margin-top:2px}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-top:10px}
  .entry .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .entry .name{font-weight:700;font-size:16px}
  .entry .meta{font-size:12px;color:var(--sub);margin-top:2px}
  .entry .setline{font-size:14px;color:var(--text);margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:13px}
  .entry .note{font-size:13px;color:var(--warn);margin-top:8px}
  .empty{text-align:center;color:var(--sub);padding:30px 10px;font-size:14px}
  .day-total{font-size:13px;color:var(--sub);margin:14px 2px 0}
  .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,21,.96);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;z-index:30}
  .tabbar button{flex:1;background:transparent;border:none;color:var(--sub);
    font-size:12px;padding:9px 0 calc(9px + env(safe-area-inset-bottom));cursor:pointer;display:flex;
    flex-direction:column;align-items:center;gap:3px}
  .tabbar button.active{color:var(--accent)}
  .tabbar .ic{font-size:20px;line-height:1}
  .hidden{display:none!important}
  .hist-day{margin-top:18px}
  .hist-day .d{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:2px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;
    align-items:center;justify-content:center;padding:18px}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;width:100%;max-width:520px;max-height:82vh;overflow:auto}
  .modal h3{margin:0 0 12px;font-size:16px}
  .modal textarea{min-height:230px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;margin-bottom:12px}
  .seg button{flex:1;background:transparent;border:none;color:var(--sub);padding:9px;font-size:13px;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;
    z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  datalist{display:none}
  .suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .suggest .tag{cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <h1>💪 我的健身记录</h1>
      <div class="date-pick">
        <span>📅</span>
        <input type="date" id="curDate">
      </div>
    </div>
  </header>

  <!-- ===== 记录页 ===== -->
  <section id="page-log">
    <div class="card">
      <h2>添加动作</h2>
      <div class="field">
        <label>动作名称</label>
        <input id="exName" list="exList" placeholder="如：杠铃卧推" autocomplete="off">
        <datalist id="exList"></datalist>
        <div class="suggest" id="exSuggest"></div>
      </div>

      <label>组数（重量 kg × 次数，可填组间休息秒）</label>
      <div class="sets" id="setsBox"></div>
      <button class="add-set" id="addSetBtn">+ 增加一组</button>

      <div class="field" style="margin-top:12px">
        <label>备注（RPE / 状态 / 感受，可留空）</label>
        <textarea id="exNote" placeholder="如：RPE 8，状态不错，最后一组略勉强"></textarea>
      </div>
      <button class="btn green" id="saveExBtn">保存这个动作</button>
    </div>

    <div class="day-total" id="dayTotal"></div>
    <div id="todayList"></div>
  </section>

  <!-- ===== 历史页 ===== -->
  <section id="page-hist" class="hidden">
    <div id="histList"></div>
  </section>

  <!-- ===== 数据页 ===== -->
  <section id="page-data" class="hidden">
    <div class="card">
      <h2>导出 / 备份</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        导出后可直接把内容粘贴给大模型分析，或保存为文件备份。
      </p>
      <div class="toolbar">
        <button class="btn" id="expMd">复制 Markdown</button>
        <button class="btn ghost" id="expJson">复制 JSON</button>
        <button class="btn ghost" id="dlJson">下载 JSON 备份</button>
        <button class="btn ghost" id="dlCsv">下载 CSV</button>
      </div>
    </div>
    <div class="card">
      <h2>导入 / 恢复</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        选择之前下载的 JSON 备份文件即可恢复（会覆盖当前数据）。
      </p>
      <input type="file" id="impFile" accept="application/json,.json">
    </div>
    <div class="card">
      <h2>统计</h2>
      <div id="statBox" style="font-size:14px;color:var(--sub);line-height:1.8"></div>
      <button class="btn danger" id="clearAll" style="margin-top:14px">清空全部数据</button>
    </div>
  </section>
</div>

<nav class="tabbar">
  <button data-page="log" class="active"><span class="ic">📝</span>记录</button>
  <button data-page="hist"><span class="ic">📚</span>历史</button>
  <button data-page="data"><span class="ic">📤</span>数据</button>
</nav>

<div id="toast" class="toast"></div>

<!-- 文本导出弹窗 -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modalTitle">导出内容</h3>
    <textarea id="modalText" readonly></textarea>
    <div class="toolbar" style="margin-top:12px">
      <button class="btn" id="modalCopy">复制到剪贴板</button>
      <button class="btn ghost" id="modalClose">关闭</button>
    </div>
  </div>
</div>

<script>
/* ========= 存储层 ========= */
const KEY = 'fitlog_v1';
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {entries:[]}; }catch(e){ return {entries:[]}; } }
function save(db){ localStorage.setItem(KEY, JSON.stringify(db)); }
let DB = load();

/* entry: {id, date:'YYYY-MM-DD', name, sets:[{w,r,rest}], note, ts} */

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(d){ d=d||new Date(); const z=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }

/* ========= 通用 UI ========= */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }

const curDate = document.getElementById('curDate');
curDate.value = todayStr();
curDate.addEventListener('change', ()=>{ renderToday(); });

/* ========= 组数编辑 ========= */
function setRow(s={w:'',r:'',rest:''}, idx=0){
  const div=document.createElement('div'); div.className='set-row';
  div.innerHTML=`
    <span class="idx">${idx+1}</span>
    <input class="w" type="number" inputmode="decimal" placeholder="kg" value="${s.w}">
    <input class="r" type="number" inputmode="numeric" placeholder="次" value="${s.r}">
    <input class="rest" type="number" inputmode="numeric" placeholder="休息s" value="${s.rest}">
    <button class="x" title="删除">×</button>`;
  div.querySelector('.x').onclick=()=>{ div.remove(); reindexSets(); };
  return div;
}
function reindexSets(){ [...document.querySelectorAll('#setsBox .set-row .idx')]
  .forEach((el,i)=>el.textContent=i+1); }
const setsBox=document.getElementById('setsBox');
function resetSets(){ setsBox.innerHTML=''; setsBox.appendChild(setRow({w:'',r:'',rest:''},0)); }
document.getElementById('addSetBtn').onclick=()=>{
  const n=setsBox.children.length; setsBox.appendChild(setRow({w:'',r:'',rest:''},n)); };
resetSets();

/* 常用动作建议 */
function refreshSuggest(){
  const names=[...new Set(DB.entries.map(e=>e.name))];
  const dl=document.getElementById('exList'); dl.innerHTML=names.map(n=>`<option value="${n}">`).join('');
  const common=['杠铃卧推','深蹲','硬拉','引体向上','坐姿划船','哑铃飞鸟','肩上推举','二头弯举','腿举','卷腹'];
  const merged=[...new Set([...names,...common])].slice(0,10);
  document.getElementById('exSuggest').innerHTML=merged.map(n=>`<span class="tag" data-n="${n}">${n}</span>`).join('');
  document.querySelectorAll('#exSuggest .tag').forEach(t=>t.onclick=()=>{
    document.getElementById('exName').value=t.dataset.n; });
}

/* ========= 保存动作 ========= */
document.getElementById('saveExBtn').onclick=()=>{
  const name=document.getElementById('exName').value.trim();
  if(!name){ toast('请填写动作名称'); return; }
  const sets=[...document.querySelectorAll('#setsBox .set-row')].map(row=>({
    w: parseFloat(row.querySelector('.w').value)||0,
    r: parseInt(row.querySelector('.r').value)||0,
    rest: parseInt(row.querySelector('.rest').value)||0
  })).filter(s=>s.w||s.r);
  if(!sets.length){ toast('至少填写一组重量或次数'); return; }
  const note=document.getElementById('exNote').value.trim();
  DB.entries.push({id:uid(),date:curDate.value,name,sets,note,ts:Date.now()});
  save(DB);
  document.getElementById('exName').value='';
  document.getElementById('exNote').value='';
  resetSets(); refreshSuggest(); renderToday();
  toast('已保存 ✓');
};

/* ========= 渲染今天 ========= */
function fmtSet(s){ let t=`${s.w}kg×${s.r}`; if(s.rest) t+=` (休${s.rest}s)`; return t; }
function entryCard(e){
  const div=document.createElement('div'); div.className='entry';
  const vol=e.sets.reduce((a,s)=>a+s.w*s.r,0);
  div.innerHTML=`
    <div class="top">
      <div>
        <div class="name">${e.name}</div>
        <div class="meta">${e.sets.length} 组 · 容量 ${vol.toFixed(0)} kg</div>
      </div>
      <button class="btn danger sm" data-del="${e.id}">删除</button>
    </div>
    <div class="setline">${e.sets.map(s=>`<span class="tag">${fmtSet(s)}</span>`).join('')}</div>
    ${e.note?`<div class="note">📌 ${e.note}</div>`:''}`;
  div.querySelector('[data-del]').onclick=()=>{
    if(confirm('删除「'+e.name+'」这条记录？')){
      DB.entries=DB.entries.filter(x=>x.id!==e.id); save(DB); renderToday(); renderHist(); }
  };
  return div;
}
function renderToday(){
  const d=curDate.value;
  const list=DB.entries.filter(e=>e.date===d).sort((a,b)=>a.ts-b.ts);
  const box=document.getElementById('todayList'); box.innerHTML='';
  const tt=document.getElementById('dayTotal');
  if(!list.length){ box.innerHTML='<div class="empty">这一天还没有记录，开始添加吧</div>'; tt.textContent=''; return; }
  let vol=0,sets=0; list.forEach(e=>{ sets+=e.sets.length; vol+=e.sets.reduce((a,s)=>a+s.w*s.r,0); });
  tt.textContent=`本日合计：${list.length} 个动作 · ${sets} 组 · 总容量 ${vol.toFixed(0)} kg`;
  list.forEach(e=>box.appendChild(entryCard(e)));
}

/* ========= 渲染历史 ========= */
function renderHist(){
  const box=document.getElementById('histList'); box.innerHTML='';
  if(!DB.entries.length){ box.innerHTML='<div class="empty">还没有任何记录</div>'; return; }
  const byDay={};
  DB.entries.forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });
  Object.keys(byDay).sort().reverse().forEach(d=>{
    const list=byDay[d].sort((a,b)=>a.ts-b.ts);
    let vol=0,sets=0; list.forEach(e=>{ sets+=e.sets.length; vol+=e.sets.reduce((a,s)=>a+s.w*s.r,0); });
    const wrap=document.createElement('div'); wrap.className='hist-day';
    const head=document.createElement('div');
    head.innerHTML=`<div class="d">${d} <span class="pill" style="margin-left:6px">${list.length}动作·${sets}组·${vol.toFixed(0)}kg</span></div>`;
    wrap.appendChild(head);
    list.forEach(e=>wrap.appendChild(entryCard(e)));
    box.appendChild(wrap);
  });
}

/* ========= 导出 ========= */
function toMarkdown(){
  if(!DB.entries.length) return '（暂无数据）';
  const byDay={}; DB.entries.forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });
  let md='# 健身记录\n\n';
  Object.keys(byDay).sort().forEach(d=>{
    md+=`## ${d}\n\n`;
    byDay[d].sort((a,b)=>a.ts-b.ts).forEach(e=>{
      const sets=e.sets.map(s=>`${s.w}kg×${s.r}${s.rest?`(休${s.rest}s)`:''}`).join(', ');
      md+=`- **${e.name}**：${sets}`;
      if(e.note) md+=` — 备注：${e.note}`;
      md+='\n';
    });
    md+='\n';
  });
  return md;
}
function toCsv(){
  const rows=[['date','exercise','set_index','weight_kg','reps','rest_sec','note']];
  DB.entries.sort((a,b)=>a.date.localeCompare(b.date)||a.ts-b.ts).forEach(e=>{
    e.sets.forEach((s,i)=>rows.push([e.date,e.name,i+1,s.w,s.r,s.rest,(e.note||'').replace(/"/g,'""')]));
  });
  return rows.map(r=>r.map(c=>/[",\n]/.test(String(c))?`"${c}"`:c).join(',')).join('\n');
}
function download(filename,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function copyText(text,okMsg){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(okMsg||'已复制 ✓')).catch(()=>showModal('复制内容',text));
  } else showModal('复制内容',text);
}
function showModal(title,text){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalText').value=text;
  document.getElementById('modalBg').classList.remove('hidden');
}
document.getElementById('modalClose').onclick=()=>document.getElementById('modalBg').classList.add('hidden');
document.getElementById('modalCopy').onclick=()=>copyText(document.getElementById('modalText').value);

document.getElementById('expMd').onclick=()=>{ const t=toMarkdown(); showModal('Markdown（点复制后粘给大模型）',t); };
document.getElementById('expJson').onclick=()=>{ const t=JSON.stringify(DB,null,2); showModal('JSON',t); };
document.getElementById('dlJson').onclick=()=>{ download(`健身备份_${todayStr()}.json`,JSON.stringify(DB,null,2),'application/json'); toast('已下载备份'); };
document.getElementById('dlCsv').onclick=()=>{ download(`健身记录_${todayStr()}.csv`,toCsv(),'text/csv'); toast('已下载 CSV'); };

/* ========= 导入 ========= */
document.getElementById('impFile').onchange=ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(!d.entries||!Array.isArray(d.entries)) throw 0;
    if(confirm('导入将覆盖当前所有数据，确定？')){ DB=d; save(DB); refreshSuggest(); renderToday(); renderHist(); renderStat(); toast('导入成功'); }
  }catch(e){ toast('文件格式不正确'); } };
  r.readAsText(f); ev.target.value='';
};
document.getElementById('clearAll').onclick=()=>{
  if(confirm('确定清空全部健身数据？此操作不可恢复（建议先下载备份）')){
    DB={entries:[]}; save(DB); refreshSuggest(); renderToday(); renderHist(); renderStat(); toast('已清空'); }
};

/* ========= 统计 ========= */
function renderStat(){
  const box=document.getElementById('statBox');
  const days=new Set(DB.entries.map(e=>e.date)).size;
  const total=DB.entries.length;
  const totalSets=DB.entries.reduce((a,e)=>a+e.sets.length,0);
  const totalVol=DB.entries.reduce((a,e)=>a+e.sets.reduce((x,s)=>x+s.w*s.r,0),0);
  box.innerHTML=`训练天数：<b style="color:var(--text)">${days}</b> 天<br>
    动作总条数：<b style="color:var(--text)">${total}</b><br>
    总组数：<b style="color:var(--text)">${totalSets}</b><br>
    累计容量：<b style="color:var(--text)">${totalVol.toFixed(0)}</b> kg`;
}

/* ========= Tab 切换 ========= */
document.querySelectorAll('.tabbar button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.tabbar button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const p=b.dataset.page;
    document.getElementById('page-log').classList.toggle('hidden',p!=='log');
    document.getElementById('page-hist').classList.toggle('hidden',p!=='hist');
    document.getElementById('page-data').classList.toggle('hidden',p!=='data');
    if(p==='hist') renderHist();
    if(p==='data') renderStat();
  };
});

/* ========= 启动 ========= */
refreshSuggest(); renderToday();

/* ========= Service Worker（离线） ========= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
