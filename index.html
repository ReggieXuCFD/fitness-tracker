<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<title>我的健身记录</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#232732; --line:#2b2f3a;
    --text:#e8eaf0; --sub:#9aa3b2; --accent:#4f9cf9; --green:#36c275;
    --red:#ff5b5b; --warn:#f5a623; --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%}
  .app{max-width:640px;margin:0 auto;padding:0 14px 96px}
  header{position:sticky;top:0;z-index:20;background:rgba(15,17,21,.92);
    backdrop-filter:blur(8px);padding:14px 0 10px;border-bottom:1px solid var(--line)}
  .h-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  h1{font-size:19px;margin:0;font-weight:700}
  .date-pick{display:flex;align-items:center;gap:6px;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:6px 10px}
  .date-pick input{background:transparent;border:none;color:var(--text);font-size:15px;outline:none}
  .pill{font-size:12px;color:var(--sub);background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:4px 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-top:14px}
  .card h2{font-size:15px;margin:0 0 12px;font-weight:600;color:var(--sub)}
  label{display:block;font-size:13px;color:var(--sub);margin:0 0 6px}
  input,textarea,select{width:100%;background:var(--card2);border:1px solid var(--line);
    border-radius:10px;color:var(--text);font-size:16px;padding:11px 12px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:46px}
  .grid{display:grid;gap:10px}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .g2{grid-template-columns:1fr 1fr}
  .field{margin-bottom:12px}
  .sync-auto{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--sub);cursor:pointer}
  .sync-auto input{width:18px;height:18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:none;border-radius:10px;font-size:15px;font-weight:600;padding:12px 14px;
    background:var(--accent);color:#fff;width:100%;cursor:pointer}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .btn.green{background:var(--green)}
  .btn.sm{width:auto;padding:8px 12px;font-size:13px}
  .btn.danger{background:transparent;color:var(--red);border:1px solid var(--line)}
  .row-actions{display:flex;gap:8px;margin-top:8px}
  .sets{margin-top:10px}
  .set-row{display:grid;grid-template-columns:30px 1fr 1fr 70px 32px;gap:8px;
    align-items:center;margin-bottom:8px}
  .set-row .idx{font-size:13px;color:var(--sub);text-align:center}
  .set-row input{padding:9px 8px;font-size:15px;text-align:center}
  .set-row .rest{font-size:12px}
  .x{background:transparent;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0}
  .add-set{font-size:13px;color:var(--accent);background:transparent;border:1px dashed var(--line);
    border-radius:8px;padding:8px;width:100%;cursor:pointer;margin-top:2px}
  .add-set.sm{padding:6px;font-size:12px;margin-top:8px}
  .log-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .log-actions .btn{flex:1;min-width:120px}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-top:10px}
  .entry .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .entry .name{font-weight:700;font-size:16px}
  .entry .meta{font-size:12px;color:var(--sub);margin-top:2px}
  .entry .setline{font-size:14px;color:var(--text);margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:13px}
  .tag.done{background:rgba(52,199,89,.14);border-color:var(--green);color:var(--green)}
  .entry .note{font-size:13px;color:var(--warn);margin-top:8px}
  .empty{text-align:center;color:var(--sub);padding:30px 10px;font-size:14px}
  .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,21,.96);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;z-index:30}
  .tabbar button{flex:1;background:transparent;border:none;color:var(--sub);
    font-size:12px;padding:9px 0 calc(9px + env(safe-area-inset-bottom));cursor:pointer;display:flex;
    flex-direction:column;align-items:center;gap:3px}
  .tabbar button.active{color:var(--accent)}
  .tabbar .ic{font-size:20px;line-height:1}
  .hidden{display:none!important}
  .hist-day{margin-top:18px}
  .hist-day .d{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:2px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;
    align-items:center;justify-content:center;padding:18px}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;width:100%;max-width:520px;max-height:82vh;overflow:auto}
  .modal h3{margin:0 0 12px;font-size:16px}
  .modal textarea{min-height:230px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;margin-bottom:12px}
  .seg button{flex:1;background:transparent;border:none;color:var(--sub);padding:9px;font-size:13px;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;
    z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  datalist{display:none}
  .suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .suggest .tag{cursor:pointer}
  /* 勾选式组（边练边打钩） */
  .setck{display:flex;align-items:center;gap:10px;background:var(--card2);
    border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:8px;cursor:pointer}
  .setck input{width:22px;height:22px;flex:0 0 auto;accent-color:var(--green);margin:0}
  .setck .si{font-size:13px;color:var(--sub);min-width:18px}
  .setck .sv{font-size:15px;font-weight:600}
  .setck .sr{font-size:12px;color:var(--sub);margin-left:auto}
  .setck.done .sv{color:var(--green);text-decoration:line-through;opacity:.7}
  .setrow{display:flex;align-items:center;gap:8px;background:var(--card2);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:8px}
  .setrow input{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:14px}
  .setrow input[type=checkbox]{width:20px;height:20px;flex:0 0 auto;accent-color:var(--green);margin:0}
  .setrow .ri{font-size:13px;color:var(--sub);min-width:18px;text-align:center}
  .setrow .rw{width:70px}
  .setrow .rr{width:60px}
  .setrow .rrest{width:74px}
  .setrow .rx{background:transparent;border:none;color:var(--sub);font-size:18px;line-height:1;padding:2px 6px;cursor:pointer;border-radius:6px}
  .setrow .rx:hover{background:var(--line);color:var(--danger)}
  .setrow.done .rw,.setrow.done .rr,.setrow.done .rrest{color:var(--green);text-decoration:line-through;opacity:.7}
  /* 组间休息倒计时条（紧凑可拖动小浮窗） */
  .rest-bar{position:fixed;right:12px;bottom:80px;left:auto;width:210px;
    background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:10px 12px;
    z-index:40;box-shadow:0 8px 30px rgba(0,0,0,.5);display:none;touch-action:none}
  .rest-bar.show{display:block}
  .rest-bar .rt-grip{display:flex;align-items:baseline;justify-content:space-between;gap:8px;cursor:grab}
  .rest-bar .rt-grip:active{cursor:grabbing}
  .rest-bar .rt-time{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
  .rest-bar .rt-lbl{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
  .rest-bar .rt-btns{display:flex;gap:6px;margin-top:8px}
  .rest-bar .rt-btns .btn{padding:6px;flex:1;font-size:12px}
  .rest-prog{height:4px;background:var(--card2);border-radius:999px;margin-top:8px;overflow:hidden}
  .rest-prog>div{height:100%;background:var(--accent);width:100%;transition:width .25s linear}
  /* 历史选择导出 */
  .hist-day .d{display:flex;align-items:center;gap:8px}
  .hist-day .d input{width:20px;height:20px;flex:0 0 auto;accent-color:var(--accent);margin:0}
  .sel-bar{position:sticky;top:54px;z-index:15;display:flex;gap:8px;align-items:center;
    background:rgba(15,17,21,.92);backdrop-filter:blur(8px);padding:10px 0;border-bottom:1px solid var(--line)}
  .sel-bar .btn.sm{flex:0 0 auto}
  .sel-bar .scount{font-size:13px;color:var(--sub);margin-left:auto}
  /* 训练卡（一天=一次训练） */
  .sess{background:linear-gradient(135deg,#1f2530,#1a1d24);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;margin-top:14px}
  .sess .s-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .sess .s-title{font-size:18px;font-weight:800}
  .sess .s-date{font-size:12px;color:var(--sub);margin-top:3px}
  .sess .s-stat{font-size:13px;color:var(--accent);margin-top:8px}
  .sess .s-note{font-size:13px;color:var(--warn);margin-top:8px;white-space:pre-wrap}
  .sess .s-acts{display:flex;gap:8px;flex-wrap:wrap}
  .sess.clickable{cursor:pointer}
  .sess .s-arrow{display:inline-block;color:var(--sub);font-size:14px}
  .hist-body{margin-top:2px}
  .hist-day .sess{margin-top:18px}
  /* 历史日历视图 */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
  .cal-head .cal-nav{background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:10px;font-size:18px;width:40px;height:40px;cursor:pointer}
  .cal-head .cal-title{font-size:16px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px}
  .cal-grid .cal-wd{text-align:center;font-size:12px;color:var(--sub);padding:4px 0}
  .cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-size:14px;color:var(--text);cursor:default;position:relative}
  .cal-cell.empty{border:none;background:transparent}
  .cal-cell.other{color:var(--sub);opacity:.4}
  .cal-cell.today{border-color:var(--accent)}
  .cal-cell.has{background:rgba(79,156,249,.16);border-color:var(--accent);cursor:pointer}
  .cal-cell.has.sel{background:rgba(54,194,117,.22);border-color:var(--green)}
  .cal-cell .cal-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .cal-cell .cal-vol{font-size:9px;color:var(--accent);line-height:1}
  .cal-detail{margin-top:8px}
  /* 部位标签 */
  .s-parts{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
  .part-tag{font-size:12px;font-weight:600;padding:2px 9px;border-radius:999px;
    color:var(--pc);background:rgba(255,255,255,.04);border:1px solid var(--pc)}
  .cal-cell .cal-parts{font-size:9px;color:var(--accent);line-height:1.1;text-align:center;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .part-pick{display:flex;flex-wrap:wrap;gap:8px}
  .part-chip{font-size:14px;padding:7px 14px;border-radius:999px;background:var(--card2);
    border:1px solid var(--line);color:var(--sub);cursor:pointer}
  .part-chip.active{background:rgba(255,255,255,.05);border-color:var(--pc);color:var(--pc);font-weight:600}
  /* 动作库管理页 */
  .ex-mgr-grp{margin-top:18px}
  .ex-mgr-grp .emg-h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px}
  .ex-mgr-grp .emg-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
  .ex-mgr-grp .emg-cnt{font-size:12px;color:var(--sub);font-weight:400;margin-left:auto}
  .ex-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px}
  .ex-card .ec-name{width:100%;font-size:15px;font-weight:600;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);padding:4px 0}
  .ex-card .ec-name:focus{border-bottom-color:var(--accent)}
  .ex-card .ec-parts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .ex-card .ec-chip{font-size:13px;padding:5px 11px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--sub);cursor:pointer}
  .ex-card .ec-chip.active{background:rgba(255,255,255,.05);border-color:var(--pc);color:var(--pc);font-weight:600}
  .ex-actions{display:flex;gap:8px;margin-top:10px}
  .modal .set-row{grid-template-columns:30px 1fr 1fr 70px 32px}
  .modal .set-row .idx{font-size:13px;color:var(--sub);text-align:center}
  /* 饮食 */
  .diet-sum{background:linear-gradient(135deg,#1f2530,#1a1d24);border:1px solid var(--line);
    border-radius:var(--radius);padding:16px;margin-top:14px}
  .diet-sum .ds-kcal{font-size:32px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}
  .diet-sum .ds-kcal small{font-size:14px;color:var(--sub);font-weight:600;margin-left:6px}
  .diet-sum .ds-macros{display:flex;gap:10px;margin-top:12px}
  .diet-sum .ds-m{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
  .diet-sum .ds-m .v{font-size:18px;font-weight:700}
  .diet-sum .ds-m .l{font-size:11px;color:var(--sub);margin-top:2px}
  .diet-sum .ds-m.p .v{color:#4f9cf9} .diet-sum .ds-m.f .v{color:#f5a623} .diet-sum .ds-m.c .v{color:#36c275}
  .meal-grp{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-top:12px}
  .meal-grp .mg-head{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--sub);margin-bottom:6px}
  .meal-grp .mg-slot{font-weight:700;color:var(--accent);font-size:15px}
  .meal-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line)}
  .meal-item .mi-name{flex:1;font-size:15px}
  .meal-item .mi-sub{font-size:12px;color:var(--sub);margin-top:2px}
  .meal-item .mi-kcal{font-size:14px;font-weight:700;color:var(--green);white-space:nowrap}
  .meal-item .x{font-size:20px}
  .food-cats{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 10px}
  .food-cats .fc{font-size:12px;color:var(--sub);background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:5px 11px;cursor:pointer}
  .food-cats .fc.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .food-results{max-height:34vh;overflow:auto;margin-bottom:6px}
  .food-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 10px;
    border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--card2)}
  .food-row:active{transform:scale(.99)}
  .food-row .fr-name{font-size:15px;font-weight:600}
  .food-row .fr-meta{font-size:12px;color:var(--sub);margin-top:2px}
  .food-row .fr-tag{font-size:11px;color:var(--sub);border:1px solid var(--line);border-radius:6px;padding:2px 6px;white-space:nowrap}
  .portion-box{border-top:1px solid var(--line);padding-top:12px;margin-top:4px}
  .portion-box .pb-name{font-size:17px;font-weight:700}
  .portion-box .pb-per100{font-size:12px;color:var(--sub);margin:4px 0 10px}
  .portion-box .pb-result{margin-top:12px;background:var(--card2);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.7}
  .portion-box .pb-result b{color:var(--green)}
  /* 动作历史 */
  .name-link{cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:3px}
  .name-link:active{color:var(--accent)}
  .exh-day{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;background:var(--card2)}
  .exh-day .exh-d{font-size:13px;font-weight:700;color:var(--accent);display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .exh-day .exh-best{font-size:12px;color:var(--sub);font-weight:600}
  .exh-day .exh-sets{font-size:14px;margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
  .exh-empty{text-align:center;color:var(--sub);padding:24px 10px;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <h1>💪 我的健身记录</h1>
      <div class="date-pick">
        <span>📅</span>
        <input type="date" id="curDate">
      </div>
    </div>
  </header>

  <!-- ===== 记录页 ===== -->
  <section id="page-log">
    <div id="todayList"></div>
    <div class="log-actions">
      <button class="btn green" id="addExBtn">＋ 添加动作</button>
    </div>
    <datalist id="exList"></datalist>
  </section>

  <!-- ===== 历史页 ===== -->
  <section id="page-hist" class="hidden">
    <div class="seg" id="histViewSeg" style="margin-top:14px">
      <button data-hv="cal" class="active">📅 日历</button>
      <button data-hv="list">📋 列表</button>
    </div>
    <div class="sel-bar">
      <button class="btn ghost sm" id="selToggle">勾选导出</button>
      <button class="btn sm hidden" id="selExport">导出所选</button>
      <button class="btn ghost sm hidden" id="selCancel">取消</button>
      <span class="scount" id="selCount"></span>
    </div>
    <div id="histCal"></div>
    <div id="histList"></div>
  </section>

  <!-- ===== 数据页 ===== -->
  <section id="page-data" class="hidden">
    <div class="card">
      <h2>导出 / 备份</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        导出后可直接把内容粘贴给大模型分析，或保存为文件备份。
      </p>
      <div class="toolbar">
        <button class="btn" id="expMd">复制 Markdown</button>
        <button class="btn ghost" id="expJson">复制 JSON</button>
        <button class="btn ghost" id="dlJson">下载 JSON 备份</button>
        <button class="btn ghost" id="dlCsv">下载 CSV</button>
      </div>
    </div>
    <div class="card">
      <h2>☁️ 云同步（GitHub Gist）</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        填入一个 GitHub Token，数据会存到你的私有 Gist，手机和电脑都用同一个 Token 即可同步。
        <a href="https://github.com/settings/tokens/new?scopes=gist&description=fitness-tracker" target="_blank" style="color:var(--accent)">点此创建 Token</a>（勾选 gist 权限即可）。
      </p>
      <div class="field">
        <label>GitHub Token</label>
        <input id="syncToken" type="password" placeholder="ghp_... 或 github_pat_..." autocomplete="off">
      </div>
      <div class="field">
        <label>Gist ID（首次上传后自动生成，另一台设备填同一个）</label>
        <input id="syncGist" placeholder="留空：首次上传会自动创建" autocomplete="off">
      </div>

<script>
/* ========= 存储层 ========= */
const KEY = 'fitlog_v1';
function load(){ try{ const d=JSON.parse(localStorage.getItem(KEY))||{}; if(!Array.isArray(d.entries))d.entries=[]; if(!Array.isArray(d.templates))d.templates=[]; if(!d.sessions||typeof d.sessions!=='object')d.sessions={}; if(!Array.isArray(d.meals))d.meals=[]; if(!Array.isArray(d.customFoods))d.customFoods=[]; if(!Array.isArray(d.exercises))d.exercises=[]; migrateExercises(d); return d; }catch(e){ return {entries:[],templates:[],sessions:{},meals:[],customFoods:[],exercises:[]}; } }
function save(db){ db.updatedAt=Date.now(); localStorage.setItem(KEY, JSON.stringify(db)); scheduleAutoSync(); }
/* 存量迁移：为没有 exId 的历史记录按动作名建立动作库并关联（幂等） */
function migrateExercises(d){
  if(!Array.isArray(d.exercises)) d.exercises=[];
  const byName={}; d.exercises.forEach(x=>{ byName[x.name.trim()]=x; });
  let changed=false;
  d.entries.forEach(e=>{
    if(e.exId || !e.name) return;
    const key=e.name.trim();
    let ex=byName[key];
    if(!ex){ ex={id:'ex_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7), name:key, ts:Date.now()}; d.exercises.push(ex); byName[key]=ex; }
    e.exId=ex.id; changed=true;
  });
  return changed;
}
/* 在动作库中按名查找，没有则新建并返回（写入全局 DB） */
function findOrCreateExercise(name){
  const key=(name||'').trim(); if(!key) return null;
  let ex=DB.exercises.find(x=>x.name.trim()===key);
  if(!ex){ ex={id:'ex_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7), name:key, ts:Date.now()}; DB.exercises.push(ex); }
  return ex;
}
let DB = load();

/* entry: {id, date:'YYYY-MM-DD', exId, name, sets:[{w,r,rest,done}], note, ts} */
/* exercise: {id, name, part, ts} —— 动作库，entry.exId 关联，part 为训练部位 */
/* sessions: { 'YYYY-MM-DD': {note, weight} }  —— 一天即一次训练的元信息（weight 单位 kg） */
/* meal: {id, date:'YYYY-MM-DD', slot:'早/午/晚/加餐', name, grams, kcal, p, f, c, ts} —— 一条饮食记录（kcal/p/f/c 为该份量的实际值） */
/* customFood: {id, name, cat, unit, base(每单位克数), per100:{kcal,p,f,c}, ts} —— 用户自建食物 */
function getSession(date){ return DB.sessions[date] || {note:'',weight:''}; }
function setSession(date, obj){
  const cur=getSession(date); const next={...cur,...obj};
  if(!next.note && !next.weight) delete DB.sessions[date];
  else DB.sessions[date]=next;
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(d){ d=d||new Date(); const z=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function parseDate(s){ const p=String(s).split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function weekdayCn(s){ return '周'+'日一二三四五六'[parseDate(s).getDay()]; }

/* ========= 训练部位 ========= */
const PARTS=['胸','背','腿','肩','手臂','核心'];
const PART_COLOR={'胸':'#ff8c69','背':'#4f9cf9','腿':'#36c275','肩':'#f5a623','手臂':'#b07cff','核心':'#ff6fae'};
/* 取某动作（exId）的部位标签 */
function exPart(exId){ const ex=DB.exercises.find(x=>x.id===exId); return ex&&ex.part? ex.part : ''; }
/* 一次训练（动作列表）涉及的部位，按 PARTS 固定顺序去重 */
function sessionParts(list){
  const set=new Set();
  list.forEach(e=>{ const p=exPart(e.exId); if(p) set.add(p); });
  return PARTS.filter(p=>set.has(p));
}
function partTagsHtml(parts){
  return parts.map(p=>`<span class="part-tag" style="--pc:${PART_COLOR[p]||'var(--sub)'}">${p}</span>`).join('');
}

/* ========= 通用 UI ========= */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }

const curDate = document.getElementById('curDate');
curDate.value = todayStr();
curDate.addEventListener('change', ()=>{ renderToday(); renderDiet(); });

/* 常用动作建议（供弹窗 datalist 使用） */
function refreshSuggest(){
  const names=[...new Set(DB.exercises.map(e=>e.name))];
  const common=['杠铃卧推','深蹲','硬拉','引体向上','坐姿划船','哑铃飞鸟','肩上推举','二头弯举','腿举','卷腹'];
  const merged=[...new Set([...names,...common])];
  const dl=document.getElementById('exList'); dl.innerHTML=merged.map(n=>`<option value="${n}">`).join('');
}

/* ========= 一次训练（按天）卡片 ========= */
function sessionStat(list){
  let vol=0,sets=0,doneSets=0;
  list.forEach(e=>{ sets+=e.sets.length; vol+=e.sets.reduce((a,s)=>a+s.w*s.r,0); doneSets+=e.sets.filter(s=>s.done).length; });
  return {vol,sets,doneSets};
}
function sessionHeader(date, list, opts={}){
  const s=getSession(date); const st=sessionStat(list);
  const head=document.createElement('div'); head.className='sess';
  head.innerHTML=`
    <div class="s-top">
      <div>
        <div class="s-title">${opts.collapsible?`<span class="s-arrow">${opts.expanded?'▾':'▸'}</span> `:''}📅 ${date} ${weekdayCn(date)}</div>
        ${sessionParts(list).length?`<div class="s-parts">${partTagsHtml(sessionParts(list))}</div>`:`<div class="s-date">未标部位</div>`}
      </div>
      <button class="btn ghost sm" data-sedit>编辑训练</button>
    </div>
    <div class="s-stat">${list.length} 个动作 · ${st.sets} 组 · 容量 ${st.vol.toFixed(0)} kg${opts.showDone?` · 已完成 ${st.doneSets}/${st.sets} 组`:''}${s.weight?` · ⚖️ ${s.weight} kg`:''}</div>
    ${s.note?`<div class="s-note">📝 ${s.note}</div>`:''}`;
  head.querySelector('[data-sedit]').onclick=(ev)=>{ ev.stopPropagation(); openSessModal(date); };
  return head;
}

/* ========= 渲染今天 ========= */
function fmtSet(s){ let t=`${s.w}kg×${s.r}`; if(s.rest) t+=` (休${s.rest}s)`; return t; }
function entryCard(e, interactive){
  const div=document.createElement('div'); div.className='entry';
  const vol=e.sets.reduce((a,s)=>a+s.w*s.r,0);
  const doneN=e.sets.filter(s=>s.done).length;
  div.innerHTML=`
    <div class="top">
      <div>
        <div class="name name-link" data-hist="${e.exId||''}" title="查看历史">${e.name}</div>
        <div class="meta">${e.sets.length} 组 · 容量 ${vol.toFixed(0)} kg${(interactive||doneN)?` · 已完成 ${doneN}/${e.sets.length}`:''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn ghost sm" data-up="${e.id}" title="上移">↑</button>
        <button class="btn ghost sm" data-down="${e.id}" title="下移">↓</button>
        <button class="btn ghost sm" data-edit="${e.id}">编辑</button>
        <button class="btn danger sm" data-del="${e.id}">删除</button>
      </div>
    </div>
    ${interactive
      ? `<div class="sets-ck">${e.sets.map((s,i)=>`
          <div class="setrow${s.done?' done':''}" data-i="${i}">
            <input type="checkbox" class="rdone" ${s.done?'checked':''}>
            <span class="ri">${i+1}</span>
            <input class="rw" type="number" inputmode="decimal" placeholder="kg" value="${s.w}">
            <span style="color:var(--sub);font-size:13px">kg ×</span>
            <input class="rr" type="number" inputmode="numeric" placeholder="次" value="${s.r}">
            <span style="color:var(--sub);font-size:13px">次</span>
            <input class="rrest" type="number" inputmode="numeric" placeholder="休息s" value="${s.rest||''}">
            <span style="color:var(--sub);font-size:13px">s</span>
            <button class="rx" title="删除该组">×</button>
          </div>`).join('')}</div>
          <button class="add-set sm" data-addset>+ 增加一组</button>`
      : `<div class="setline">${e.sets.map(s=>`<span class="tag${s.done?' done':''}">${s.done?'✓ ':''}${fmtSet(s)}</span>`).join('')}</div>`}
    ${e.note?`<div class="note">📌 ${e.note}</div>`:''}`;
  div.querySelector('[data-del]').onclick=()=>{
    if(confirm('删除「'+e.name+'」这条记录？')){
      DB.entries=DB.entries.filter(x=>x.id!==e.id); save(DB); renderToday(); renderHist(); }
  };
  div.querySelector('[data-edit]').onclick=()=>openExModal(e.id);
  const histEl=div.querySelector('[data-hist]');
  if(histEl) histEl.onclick=()=>openExHistory(e.exId, e.name);
  const upBtn=div.querySelector('[data-up]'), dnBtn=div.querySelector('[data-down]');
  if(upBtn) upBtn.onclick=()=>swapEntryOrder(e.id,-1);
  if(dnBtn) dnBtn.onclick=()=>swapEntryOrder(e.id,1);
  if(interactive){
    const addBtn=div.querySelector('[data-addset]');
    if(addBtn) addBtn.onclick=()=>{
      const last=e.sets[e.sets.length-1]||{w:0,r:0,rest:0};
      e.sets.push({w:last.w,r:last.r,rest:last.rest,done:false});
      save(DB); renderToday();
    };
    div.querySelectorAll('.setrow').forEach(row=>{
      const i=+row.dataset.i;
      const doneCb=row.querySelector('.rdone');
      const wInput=row.querySelector('.rw');
      const rInput=row.querySelector('.rr');
      const restInput=row.querySelector('.rrest');
      const xBtn=row.querySelector('.rx');
      function updateSet(){
        e.sets[i].w=parseFloat(wInput.value)||0;
        e.sets[i].r=parseInt(rInput.value)||0;
        e.sets[i].rest=parseInt(restInput.value)||0;
        save(DB);
        // 只更新本卡片内的 meta，不重渲染，避免输入焦点丢失
        const vol=e.sets.reduce((a,s)=>a+s.w*s.r,0);
        const meta=div.querySelector('.meta');
        if(meta) meta.textContent=`${e.sets.length} 组 · 容量 ${vol.toFixed(0)} kg · 已完成 ${e.sets.filter(s=>s.done).length}/${e.sets.length}`;
      }
      doneCb.onchange=()=>{
        e.sets[i].done=doneCb.checked;
        row.classList.toggle('done',doneCb.checked);
        save(DB);
        const meta=div.querySelector('.meta');
        if(meta) meta.textContent=`${e.sets.length} 组 · 容量 ${e.sets.reduce((a,s)=>a+s.w*s.r,0).toFixed(0)} kg · 已完成 ${e.sets.filter(s=>s.done).length}/${e.sets.length}`;
        if(doneCb.checked && e.sets[i].rest>0) startRest(e.sets[i].rest, `${e.name} · 第${i+1}组后`);
      };
      wInput.oninput=updateSet;
      rInput.oninput=updateSet;
      restInput.oninput=updateSet;
      xBtn.onclick=()=>{
        if(e.sets.length<=1){ toast('至少保留一组'); return; }
        e.sets.splice(i,1);
        save(DB); renderToday();
      };
    });
  }
  return div;
}
function swapEntryOrder(id, dir){
  // 通用：按 entry.id 反查日期，而不是假设当前日期
  const e=DB.entries.find(x=>x.id===id);
  if(!e) return;
  const list=DB.entries.filter(x=>x.date===e.date).sort((a,b)=>a.ts-b.ts);
  const i=list.findIndex(x=>x.id===id);
  if(i<0) return;
  const j=i+dir;
  if(j<0 || j>=list.length) return;
  const a=list[i], b=list[j];
  const tmp=a.ts; a.ts=b.ts; b.ts=tmp;
  if(a.ts===b.ts){ a.ts+=1; b.ts-=1; }
  save(DB); renderToday(); renderHist();
}
function renderToday(){
  const d=curDate.value;
  const list=DB.entries.filter(e=>e.date===d).sort((a,b)=>a.ts-b.ts);
  const box=document.getElementById('todayList'); box.innerHTML='';
  if(!list.length){ box.innerHTML='<div class="empty">这一天还没有记录，点下方「添加动作」开始，或在历史里把某天「复制到今天」</div>'; return; }
  box.appendChild(sessionHeader(d, list, {showDone:true}));
  list.forEach(e=>box.appendChild(entryCard(e, true)));
}

/* ========= 渲染历史 ========= */
let selMode=false;
let histView='cal';
let calCursor=todayStr().slice(0,7); // 'YYYY-MM'
let calOpenDay='';
const selDays=new Set();
const expandDays=new Set();
function copySessionToToday(srcDate){
  const list=DB.entries.filter(e=>e.date===srcDate).sort((a,b)=>a.ts-b.ts);
  if(!list.length){ toast('这一天没有动作可复制'); return; }
  const dest=curDate.value;
  if(srcDate===dest){
    if(!confirm('源日期和目标日期相同，这会在同一天再创建一份相同动作。确认？')) return;
  }
  const prefix=Date.now();
  list.forEach((e,i)=>{

function renderHistCal(){
  const cal=document.getElementById('histCal'); cal.innerHTML='';
  const days={};
  DB.entries.forEach(e=>{ (days[e.date]=days[e.date]||[]).push(e); });
  const ymp=calCursor.split('-').map(Number); const yy=ymp[0], mm=ymp[1];
  const startWd=new Date(yy, mm-1, 1).getDay();
  const daysInMonth=new Date(yy, mm, 0).getDate();
  const today=todayStr();
  const wd='\u65e5\u4e00\u4e8c\u4e09\u56db\u4e94\u516d';
  const head=document.createElement('div'); head.className='cal-head';
  head.innerHTML='<button class="cal-nav" data-mv="-1">\u2039</button>'

    +'<button class="cal-nav" data-mv="1">\u203a</button>';
  head.querySelector('[data-mv="-1"]').onclick=function(){ calCursor=shiftMonth(calCursor,-1); calOpenDay=''; renderHistCal(); };
  head.querySelector('[data-mv="1"]').onclick=function(){ calCursor=shiftMonth(calCursor,1); calOpenDay=''; renderHistCal(); };
  cal.appendChild(head);
  const grid=document.createElement('div'); grid.className='cal-grid';
  for(let i=0;i<7;i++){ const c=document.createElement('div'); c.className='cal-wd'; c.textContent=wd[i]; grid.appendChild(c); }
  for(let i=0;i<startWd;i++){ const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  for(let day=1;day<=daysInMonth;day++){
    const ds=yy+'-'+String(mm).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const list=days[ds];
    const c=document.createElement('div'); c.className='cal-cell';
    if(ds===today) c.classList.add('today');
    if(list && list.length){
      c.classList.add('has');
      if(selMode && selDays.has(ds)) c.classList.add('sel');
      const parts=sessionParts(list);
      const partTxt=parts.length? parts.map(p=>p==='手臂'?'臂':(p==='核心'?'心':p)).join('') : '';
      c.innerHTML='<span>'+day+'</span><span class="cal-dot"></span>'+(partTxt?'<span class="cal-parts">'+partTxt+'</span>':'');
      c.onclick=function(){
        if(selMode){
          if(selDays.has(ds)) selDays.delete(ds); else selDays.add(ds);
          updateSelCount(); renderHistCal(); return;
        }
        calOpenDay = calOpenDay===ds ? '' : ds; renderHistCal();
      };
    } else {
      c.innerHTML='<span>'+day+'</span>';
    }
    grid.appendChild(c);
  }
  cal.appendChild(grid);
  if(calOpenDay && days[calOpenDay]){
    const dl=days[calOpenDay].sort((a,b)=>a.ts-b.ts);
    const wrap=document.createElement('div'); wrap.className='cal-detail';
    wrap.appendChild(sessionHeader(calOpenDay, dl, {showDone:true}));
    wrap.appendChild(histDayBody(calOpenDay, dl));
    cal.appendChild(wrap);

function shiftMonth(ym, delta){
  let p=ym.split('-').map(Number); let y=p[0], m=p[1]; m+=delta;
  if(m<1){ m=12; y--; } else if(m>12){ m=1; y++; }
  return y+'-'+String(m).padStart(2,'0');
}

/* ========= 导出 ========= */
function toMarkdown(daysFilter){
  let entries=DB.entries;
  if(daysFilter && daysFilter.length) entries=entries.filter(e=>daysFilter.includes(e.date));
  // 只导出已打钩完成的组；过滤掉没有任何完成组的动作
  entries=entries.map(e=>({...e,sets:e.sets.filter(s=>s.done)})).filter(e=>e.sets.length);
  if(!entries.length) return '（暂无已完成的训练记录）';
  const byDay={}; entries.forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });
  let md='# 健身训练记录\n\n';
  Object.keys(byDay).sort().forEach(d=>{
    const list=byDay[d].sort((a,b)=>a.ts-b.ts);
    let vol=0,sc=0; list.forEach(e=>{ sc+=e.sets.length; vol+=e.sets.reduce((a,s)=>a+s.w*s.r,0); });
    const s=getSession(d);
    const parts=sessionParts(list);
    const title=parts.length? `${d} ${weekdayCn(d)}（${parts.join('、')}）` : `${d} ${weekdayCn(d)}`;
    md+=`## ${title}\n\n`;
    md+=`> ${list.length} 个动作，${sc} 组，总容量 ${vol.toFixed(0)} kg\n`;
    if(s.weight) md+=`> 体重：${s.weight} kg\n`;
    if(s.note) md+=`> 整体备注：${s.note}\n`;
    md+='\n';
    list.forEach(e=>{
      md+=`### ${e.name}\n`;
      e.sets.forEach((s,i)=>{
        md+=`- 第${i+1}组：${s.w} kg × ${s.r} 次`;
        if(s.rest) md+=`，组间休息 ${s.rest}s`;
        md+='\n';
      });
      if(e.note) md+=`- 备注：${e.note}\n`;
      md+='\n';
    });
  });
  return md;
}
function toCsv(){
  const rows=[['date','exercise','set_index','weight_kg','reps','rest_sec','note']];
  DB.entries.sort((a,b)=>a.date.localeCompare(b.date)||a.ts-b.ts).forEach(e=>{
    e.sets.forEach((s,i)=>rows.push([e.date,e.name,i+1,s.w,s.r,s.rest,(e.note||'').replace(/"/g,'""')]));
  });
  return rows.map(r=>r.map(c=>/[",\n]/.test(String(c))?`"${c}"`:c).join(',')).join('\n');
}

/* ========= 云同步（GitHub Gist） ========= */
const SYNC_KEY='fitlog_sync';
const GIST_FILE='fitlog.json';
function loadSync(){ try{ return JSON.parse(localStorage.getItem(SYNC_KEY))||{}; }catch(e){ return {}; } }
function saveSync(s){ localStorage.setItem(SYNC_KEY, JSON.stringify(s)); }
let SYNC=loadSync();  // {token, gistId, auto}
let autoSyncTimer=null, syncing=false;
function setSyncStatus(msg, ok){ const el=document.getElementById('syncStatus'); if(el){ el.textContent=msg||''; el.style.color = ok===false?'var(--danger,#e66)':(ok===true?'var(--accent)':'var(--sub)'); } }
function renderAll(){ refreshSuggest(); renderToday(); renderHist(); renderStat(); renderDiet(); }

async function gistRequest(method, path, body){
  const res=await fetch('https://api.github.com'+path,{
    method, headers:{ 'Authorization':'Bearer '+SYNC.token, 'Accept':'application/vnd.github+json' },
    body: body?JSON.stringify(body):undefined
  });
  if(!res.ok){ const t=await res.text().catch(()=>''); throw new Error('GitHub '+res.status+' '+t.slice(0,120)); }
  return res.json();
}
async function syncUpload(silent){
  if(syncing) return; const s=loadSync();
  if(!s.token){ if(!silent) toast('请先填写 GitHub Token'); return; }
  SYNC=s; syncing=true; setSyncStatus('上传中…');
  try{
    const content=JSON.stringify(DB);
    const payload={ description:'fitness-tracker data', files:{ [GIST_FILE]:{ content } } };
    let r;
    if(SYNC.gistId){ r=await gistRequest('PATCH','/gists/'+SYNC.gistId, payload); }
    else { payload.public=false; r=await gistRequest('POST','/gists', payload); SYNC.gistId=r.id; document.getElementById('syncGist').value=r.id; saveSync(SYNC); }
    setSyncStatus('已上传 · '+new Date().toLocaleString(), true);
    if(!silent) toast('已上传到云端');
  }catch(e){ setSyncStatus('上传失败：'+e.message, false); if(!silent) toast('上传失败'); }
  finally{ syncing=false; }
}
async function syncDownload(silent){
  if(syncing) return; const s=loadSync();
  if(!s.token){ if(!silent) toast('请先填写 GitHub Token'); return; }
  if(!s.gistId){ if(!silent) toast('请先填写 Gist ID，或先上传一次'); return; }
  SYNC=s; syncing=true; setSyncStatus('下载中…');
  try{
    const r=await gistRequest('GET','/gists/'+SYNC.gistId);
    const file=r.files&&r.files[GIST_FILE];
    if(!file) throw new Error('Gist 中没有数据文件');
    let content=file.content;
    if(file.truncated && file.raw_url){ content=await (await fetch(file.raw_url)).text(); }
    const remote=JSON.parse(content);
    if(!remote||!Array.isArray(remote.entries)) throw new Error('云端数据格式不正确');
    if(!Array.isArray(remote.templates)) remote.templates=[];
    if(!remote.sessions||typeof remote.sessions!=='object') remote.sessions={};
    if(!Array.isArray(remote.meals)) remote.meals=[];
    if(!Array.isArray(remote.customFoods)) remote.customFoods=[];
    if(!Array.isArray(remote.exercises)) remote.exercises=[];
    migrateExercises(remote);
    if(silent){
      // 自动同步：仅当云端较新才覆盖本地
      if((remote.updatedAt||0) > (DB.updatedAt||0)){ DB=remote; localStorage.setItem(KEY, JSON.stringify(DB)); renderAll(); setSyncStatus('已从云端更新 · '+new Date().toLocaleString(), true); }
      else setSyncStatus('本地已是最新 · '+new Date().toLocaleString(), true);
    } else {
      if(!confirm('从云端下载将覆盖本机当前数据，确定？')){ syncing=false; setSyncStatus(''); return; }
      DB=remote; localStorage.setItem(KEY, JSON.stringify(DB)); renderAll();
      setSyncStatus('已从云端下载 · '+new Date().toLocaleString(), true); toast('已从云端下载');
    }
  }catch(e){ setSyncStatus('下载失败：'+e.message, false); if(!silent) toast('下载失败'); }
  finally{ syncing=false; }
}
function scheduleAutoSync(){
  const s=loadSync(); if(!s.auto||!s.token) return;
  clearTimeout(autoSyncTimer);
  autoSyncTimer=setTimeout(()=>syncUpload(true), 2500);
}
// UI 绑定
(function(){
  const tk=document.getElementById('syncToken'), gi=document.getElementById('syncGist'), au=document.getElementById('syncAuto');
  tk.value=SYNC.token||''; gi.value=SYNC.gistId||''; au.checked=!!SYNC.auto;
  function persist(){ SYNC={ token:tk.value.trim(), gistId:gi.value.trim(), auto:au.checked }; saveSync(SYNC); }
  tk.onchange=persist; gi.onchange=persist; au.onchange=()=>{ persist(); if(au.checked) syncDownload(true); };
  document.getElementById('syncUp').onclick=()=>{ persist(); syncUpload(false); };
  document.getElementById('syncDown').onclick=()=>{ persist(); syncDownload(false); };
})();
// 启动时若开启自动同步则拉取云端
if(SYNC.auto && SYNC.token && SYNC.gistId){ syncDownload(true); }

const MEAL_SLOTS=['早餐','午餐','晚餐','加餐'];
function mealStat(list){ return list.reduce((a,m)=>({kcal:a.kcal+m.kcal,p:a.p+m.p,f:a.f+m.f,c:a.c+m.c}),{kcal:0,p:0,f:0,c:0}); }
function r0(n){ return Math.round(n); } function r1(n){ return Math.round(n*10)/10; }

function renderDiet(){
  const d=curDate.value;
  const list=DB.meals.filter(m=>m.date===d).sort((a,b)=>a.ts-b.ts);
  const sum=mealStat(list);
  document.getElementById('dietSummary').innerHTML=`
    <div class="diet-sum">
      <div class="ds-kcal">${r0(sum.kcal)}<small>kcal · ${d===todayStr()?'今天':d}</small></div>
      <div class="ds-macros">
        <div class="ds-m p"><div class="v">${r0(sum.p)}g</div><div class="l">蛋白质</div></div>
        <div class="ds-m f"><div class="v">${r0(sum.f)}g</div><div class="l">脂肪</div></div>
        <div class="ds-m c"><div class="v">${r0(sum.c)}g</div><div class="l">碳水</div></div>
      </div>
    </div>`;
  const box=document.getElementById('dietList'); box.innerHTML='';
  if(!list.length){ box.innerHTML='<div class="empty">这一天还没有饮食记录，点下方「添加饮食」开始</div>'; return; }
  MEAL_SLOTS.forEach(slot=>{
    const items=list.filter(m=>m.slot===slot);

    const s=mealStat(items);
    const grp=document.createElement('div'); grp.className='meal-grp';
    grp.innerHTML=`<div class="mg-head"><span class="mg-slot">${slot}</span><span>${r0(s.kcal)} kcal · 蛋${r0(s.p)} 脂${r0(s.f)} 碳${r0(s.c)}</span></div>`;

/* ========= 组间休息倒计时 ========= */
let restTimer=null, restTotal=0, restLeft=0, restEnd=0, notifyAsked=false;
const restBar=document.getElementById('restBar');
function fmtTime(s){ const m=Math.floor(s/60), x=s%60; return m>0?`${m}:${String(x).padStart(2,'0')}`:String(s); }
function paintRest(){
  document.getElementById('restTime').textContent=fmtTime(Math.max(0,restLeft));
  document.getElementById('restProg').style.width=(restTotal?Math.max(0,restLeft)/restTotal*100:0)+'%';
}
/* 基于结束时间戳计算剩余，后台冻结后回前台也能算准 */
function tickRest(){
  restLeft=Math.round((restEnd-Date.now())/1000);
  paintRest();
  if(restLeft<=0){ restDone(); }
}
function restDone(){
  stopRest(); beep(); toast('休息结束，继续下一组 💪');
  if(document.hidden && 'Notification' in window && Notification.permission==='granted'){
    try{ new Notification('休息结束 💪', {body:document.getElementById('restLbl').textContent, tag:'fitlog-rest', renotify:true}); }catch(e){}
  }
}
function startRest(sec, label){
  restTotal=sec; restLeft=sec; restEnd=Date.now()+sec*1000;
  document.getElementById('restLbl').textContent=label||'组间休息';
  restBar.classList.add('show'); paintRest();
  if(!notifyAsked && 'Notification' in window && Notification.permission==='default'){
    notifyAsked=true; try{ Notification.requestPermission(); }catch(e){}
  }
  clearInterval(restTimer);
  restTimer=setInterval(tickRest,1000);
}
function stopRest(){ clearInterval(restTimer); restTimer=null; restEnd=0; restBar.classList.remove('show'); }
/* 回到前台时立即校正（后台定时器被冻结/节流的兜底） */
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && restTimer) tickRest(); });
function beep(){
  try{ const a=new (window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(.001,a.currentTime); g.gain.exponentialRampToValueAtTime(.3,a.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);
    o.start(); o.stop(a.currentTime+.55);
    if(navigator.vibrate) navigator.vibrate(200);
  }catch(e){}
}
document.getElementById('restSkip').onclick=stopRest;
document.getElementById('restPlus').onclick=()=>{ restEnd+=15000; restLeft+=15; restTotal=Math.max(restTotal,restLeft); paintRest(); };
document.getElementById('restMinus').onclick=()=>{ const nl=Math.max(1,restLeft-15); restEnd-=(restLeft-nl)*1000; restLeft=nl; paintRest(); };
/* 休息浮窗：拖动移动 */
(function(){
  const grip=document.getElementById('restGrip');
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  function clamp(){
    const r=restBar.getBoundingClientRect();
    let x=parseFloat(restBar.style.left), y=parseFloat(restBar.style.top);
    x=Math.min(Math.max(4,x), innerWidth-r.width-4);
    y=Math.min(Math.max(4,y), innerHeight-r.height-4);
    restBar.style.left=x+'px'; restBar.style.top=y+'px';
  }
  grip.addEventListener('pointerdown',e=>{
    const r=restBar.getBoundingClientRect();
    // 切换为基于 left/top 的绝对定位，便于拖动
    restBar.style.left=r.left+'px'; restBar.style.top=r.top+'px';
    restBar.style.right='auto'; restBar.style.bottom='auto';
    dragging=true; sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top;
    grip.setPointerCapture(e.pointerId); e.preventDefault();
  });
  grip.addEventListener('pointermove',e=>{
    if(!dragging) return;
    restBar.style.left=(ox+e.clientX-sx)+'px';
    restBar.style.top=(oy+e.clientY-sy)+'px';
  });
  grip.addEventListener('pointerup',e=>{ if(!dragging) return; dragging=false; clamp(); });
})();

  const weight=document.getElementById('edSessWeight').value.trim();
  const newDate=document.getElementById('edSessDate').value||oldDate;
  if(newDate!==oldDate){
    // 把这天所有动作迁移到新日期
    DB.entries.forEach(e=>{ if(e.date===oldDate) e.date=newDate; });
    const old=DB.sessions[oldDate]; if(old){ delete DB.sessions[oldDate]; }
  }
  // 写入新日期的元信息（先清旧再设）
  DB.sessions[newDate]={note,weight};
  if(!note && !weight) delete DB.sessions[newDate];
  save(DB);
  sessModalBg.classList.add('hidden');
  if(newDate!==oldDate) curDate.value=newDate;
  renderToday(); renderHist();
  toast('训练已更新 ✓');
};
document.getElementById('edSessDelete').onclick=()=>{
  const d=editingSessDate;
  const n=DB.entries.filter(e=>e.date===d).length;
  if(!confirm(`删除 ${d} 这次训练？将移除该天全部 ${n} 个动作，且不可恢复。`)) return;
  DB.entries=DB.entries.filter(e=>e.date!==d);
  delete DB.sessions[d];
  save(DB); sessModalBg.classList.add('hidden');
  renderToday(); renderHist(); toast('已删除整次训练');
};

/* ========= 动作历史弹窗 ========= */
const exHistBg=document.getElementById('exHistBg');
document.getElementById('exHistClose').onclick=()=>exHistBg.classList.add('hidden');
exHistBg.onclick=(ev)=>{ if(ev.target===exHistBg) exHistBg.classList.add('hidden'); };
function openExHistory(exId, name){
  document.getElementById('exHistTitle').textContent='📈 '+(name||'动作')+' · 历史';
  const body=document.getElementById('exHistBody');
  let list = exId ? DB.entries.filter(e=>e.exId===exId) : DB.entries.filter(e=>e.name===name);
  list.sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);
  if(!list.length){ body.innerHTML='<div class="exh-empty">还没有这个动作的历史记录</div>'; exHistBg.classList.remove('hidden'); return; }
  body.innerHTML=list.map(e=>{
    const best=e.sets.reduce((m,s)=> s.w>m?s.w:m, 0);
    const vol=e.sets.reduce((a,s)=>a+s.w*s.r,0);
    const tags=e.sets.map(s=>`<span class="tag${s.done?' done':''}">${s.w}kg×${s.r}</span>`).join('');
    return `<div class="exh-day">
      <div class="exh-d"><span>📅 ${e.date}</span><span class="exh-best">最重 ${best}kg · 容量 ${vol.toFixed(0)}kg</span></div>
      <div class="exh-sets">${tags}</div>
    </div>`;
  }).join('');
  exHistBg.classList.remove('hidden');
}

/* ========= 动作库管理页 ========= */
function renderExManage(){
  const box=document.getElementById('exManageList');
  const exs=[...DB.exercises].sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  if(!exs.length){ box.innerHTML='<div class="empty">还没有动作。去「记录」页添加动作后，这里就能管理啦。</div>'; return; }
  const groups=[...PARTS, ''];
  let html='';
  groups.forEach(part=>{
    const list=exs.filter(e=>(e.part||'')===part);
    if(!list.length) return;
    const label=part||'未标部位';
    const color=part?PART_COLOR[part]:'var(--sub)';
    html+=`<div class="ex-mgr-grp">
      <div class="emg-h"><span class="emg-dot" style="background:${color}"></span>${label}<span class="emg-cnt">${list.length} 个</span></div>
      ${list.map(e=>exManageCard(e)).join('')}
    </div>`;
  });
  box.innerHTML=html;
  box.querySelectorAll('.ex-card').forEach(card=>{
    const id=card.dataset.id;
    const nameInput=card.querySelector('.ec-name');
    nameInput.onchange=()=>renameExercise(id, nameInput.value);
    card.querySelectorAll('.ec-chip').forEach(chip=>{
      chip.onclick=()=>setExercisePart(id, chip.dataset.part);
    });
  });
}
function exManageCard(e){
  const chips=PARTS.map(p=>{
    const on=(e.part||'')===p;
    const style=on?` style="--pc:${PART_COLOR[p]}"`:'';
    return `<span class="ec-chip${on?' active':''}"${style} data-part="${p}">${p}</span>`;
  }).join('');
  return `<div class="ex-card" data-id="${e.id}">
    <input class="ec-name" value="${(e.name||'').replace(/"/g,'&quot;')}">
    <div class="ec-parts">${chips}</div>
  </div>`;
}
function setExercisePart(id, part){
  const ex=DB.exercises.find(x=>x.id===id); if(!ex) return;
  ex.part = ex.part===part ? '' : part;
  save(DB); renderExManage(); renderToday();
}
function renameExercise(id, name){
  const key=(name||'').trim();
  const ex=DB.exercises.find(x=>x.id===id); if(!ex) return;
  if(!key){ renderExManage(); return; }
  if(DB.exercises.some(x=>x.id!==id && x.name.trim()===key)){ toast('已有同名动作'); renderExManage(); return; }
  ex.name=key;
  DB.entries.forEach(en=>{ if(en.exId===id) en.name=key; });
  save(DB); refreshSuggest(); renderExManage(); renderToday();
  toast('已重命名');
}

/* ========= 启动 ========= */
refreshSuggest(); renderToday();

/* ========= Service Worker（离线） ========= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
