<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<title>我的健身记录</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#232732; --line:#2b2f3a;
    --text:#e8eaf0; --sub:#9aa3b2; --accent:#4f9cf9; --green:#36c275;
    --red:#ff5b5b; --warn:#f5a623; --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%}
  .app{max-width:640px;margin:0 auto;padding:0 14px 96px}
  header{position:sticky;top:0;z-index:20;background:rgba(15,17,21,.92);
    backdrop-filter:blur(8px);padding:14px 0 10px;border-bottom:1px solid var(--line)}
  .h-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  h1{font-size:19px;margin:0;font-weight:700}
  .date-pick{display:flex;align-items:center;gap:6px;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:6px 10px}
  .date-pick input{background:transparent;border:none;color:var(--text);font-size:15px;outline:none}
  .pill{font-size:12px;color:var(--sub);background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:4px 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-top:14px}
  .card h2{font-size:15px;margin:0 0 12px;font-weight:600;color:var(--sub)}
  label{display:block;font-size:13px;color:var(--sub);margin:0 0 6px}
  input,textarea,select{width:100%;background:var(--card2);border:1px solid var(--line);
    border-radius:10px;color:var(--text);font-size:16px;padding:11px 12px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:46px}
  .grid{display:grid;gap:10px}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .g2{grid-template-columns:1fr 1fr}
  .field{margin-bottom:12px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:none;border-radius:10px;font-size:15px;font-weight:600;padding:12px 14px;
    background:var(--accent);color:#fff;width:100%;cursor:pointer}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .btn.green{background:var(--green)}
  .btn.sm{width:auto;padding:8px 12px;font-size:13px}
  .btn.danger{background:transparent;color:var(--red);border:1px solid var(--line)}
  .row-actions{display:flex;gap:8px;margin-top:8px}
  .sets{margin-top:10px}
  .set-row{display:grid;grid-template-columns:30px 1fr 1fr 70px 32px;gap:8px;
    align-items:center;margin-bottom:8px}
  .set-row .idx{font-size:13px;color:var(--sub);text-align:center}
  .set-row input{padding:9px 8px;font-size:15px;text-align:center}
  .set-row .rest{font-size:12px}
  .x{background:transparent;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0}
  .add-set{font-size:13px;color:var(--accent);background:transparent;border:1px dashed var(--line);
    border-radius:8px;padding:8px;width:100%;cursor:pointer;margin-top:2px}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-top:10px}
  .entry .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .entry .name{font-weight:700;font-size:16px}
  .entry .meta{font-size:12px;color:var(--sub);margin-top:2px}
  .entry .setline{font-size:14px;color:var(--text);margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:13px}
  .entry .note{font-size:13px;color:var(--warn);margin-top:8px}
  .empty{text-align:center;color:var(--sub);padding:30px 10px;font-size:14px}
  .day-total{font-size:13px;color:var(--sub);margin:14px 2px 0}
  .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,21,.96);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;z-index:30}
  .tabbar button{flex:1;background:transparent;border:none;color:var(--sub);
    font-size:12px;padding:9px 0 calc(9px + env(safe-area-inset-bottom));cursor:pointer;display:flex;
    flex-direction:column;align-items:center;gap:3px}
  .tabbar button.active{color:var(--accent)}
  .tabbar .ic{font-size:20px;line-height:1}
  .hidden{display:none!important}
  .hist-day{margin-top:18px}
  .hist-day .d{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:2px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;
    align-items:center;justify-content:center;padding:18px}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;width:100%;max-width:520px;max-height:82vh;overflow:auto}
  .modal h3{margin:0 0 12px;font-size:16px}
  .modal textarea{min-height:230px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;margin-bottom:12px}
  .seg button{flex:1;background:transparent;border:none;color:var(--sub);padding:9px;font-size:13px;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;
    z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  datalist{display:none}
  .suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .suggest .tag{cursor:pointer}
  /* 勾选式组（边练边打钩） */
  .setck{display:flex;align-items:center;gap:10px;background:var(--card2);
    border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:8px;cursor:pointer}
  .setck input{width:22px;height:22px;flex:0 0 auto;accent-color:var(--green);margin:0}
  .setck .si{font-size:13px;color:var(--sub);min-width:18px}
  .setck .sv{font-size:15px;font-weight:600}
  .setck .sr{font-size:12px;color:var(--sub);margin-left:auto}
  .setck.done .sv{color:var(--green);text-decoration:line-through;opacity:.7}
  /* 组间休息倒计时条 */
  .rest-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:64px;width:min(92%,612px);
    background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:12px 14px;
    z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.5);display:none}
  .rest-bar.show{display:block}
  .rest-bar .rt-top{display:flex;align-items:center;justify-content:space-between}
  .rest-bar .rt-time{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
  .rest-bar .rt-lbl{font-size:13px;color:var(--sub)}
  .rest-bar .rt-btns{display:flex;gap:8px;margin-top:10px}
  .rest-bar .rt-btns .btn{padding:9px}
  .rest-prog{height:5px;background:var(--card2);border-radius:999px;margin-top:10px;overflow:hidden}
  .rest-prog>div{height:100%;background:var(--accent);width:100%;transition:width .25s linear}
  /* 模板 */
  .tpl-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:14px}
  .tpl-card .tname{font-weight:700;font-size:16px}
  .tpl-card .tmeta{font-size:12px;color:var(--sub);margin-top:2px}
  .tpl-card .tex{font-size:13px;color:var(--text);margin-top:8px;line-height:1.7}
  .tpl-card .tact{display:flex;gap:8px;margin-top:12px}
  .tpl-ex-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .tpl-ex-row input{flex:1}
  /* 历史选择导出 */
  .hist-day .d{display:flex;align-items:center;gap:8px}
  .hist-day .d input{width:20px;height:20px;flex:0 0 auto;accent-color:var(--accent);margin:0}
  .sel-bar{position:sticky;top:54px;z-index:15;display:flex;gap:8px;align-items:center;
    background:rgba(15,17,21,.92);backdrop-filter:blur(8px);padding:10px 0;border-bottom:1px solid var(--line)}
  .sel-bar .btn.sm{flex:0 0 auto}
  .sel-bar .scount{font-size:13px;color:var(--sub);margin-left:auto}
  /* 训练卡（一天=一次训练） */
  .sess{background:linear-gradient(135deg,#1f2530,#1a1d24);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;margin-top:14px}
  .sess .s-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .sess .s-title{font-size:18px;font-weight:800}
  .sess .s-date{font-size:12px;color:var(--sub);margin-top:3px}
  .sess .s-stat{font-size:13px;color:var(--accent);margin-top:8px}
  .sess .s-note{font-size:13px;color:var(--warn);margin-top:8px;white-space:pre-wrap}
  .sess .s-acts{display:flex;gap:8px;flex-wrap:wrap}
  .hist-day .sess{margin-top:18px}
  .ex-actions{display:flex;gap:8px;margin-top:10px}
  .modal .set-row{grid-template-columns:30px 1fr 1fr 70px 32px}
  .modal .set-row .idx{font-size:13px;color:var(--sub);text-align:center}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <h1>💪 我的健身记录</h1>
      <div class="date-pick">
        <span>📅</span>
        <input type="date" id="curDate">
      </div>
    </div>
  </header>

  <!-- ===== 记录页 ===== -->
  <section id="page-log">
    <div class="toolbar">
      <button class="btn ghost" id="useTplBtn">📋 从模板开始</button>
      <button class="btn ghost" id="saveTplBtn">💾 本日存为模板</button>
    </div>
    <div class="card">
      <h2>添加动作</h2>
      <div class="field">
        <label>动作名称</label>
        <input id="exName" list="exList" placeholder="如：杠铃卧推" autocomplete="off">
        <datalist id="exList"></datalist>
        <div class="suggest" id="exSuggest"></div>
      </div>

      <label>组数（重量 kg × 次数，可填组间休息秒）</label>
      <div class="sets" id="setsBox"></div>
      <button class="add-set" id="addSetBtn">+ 增加一组</button>

      <div class="field" style="margin-top:12px">
        <label>备注（RPE / 状态 / 感受，可留空）</label>
        <textarea id="exNote" placeholder="如：RPE 8，状态不错，最后一组略勉强"></textarea>
      </div>
      <button class="btn green" id="saveExBtn">保存这个动作</button>
    </div>

    <div class="day-total" id="dayTotal"></div>
    <div id="todayList"></div>
  </section>

  <!-- ===== 历史页 ===== -->
  <section id="page-hist" class="hidden">
    <div class="sel-bar">
      <button class="btn ghost sm" id="selToggle">勾选导出</button>
      <button class="btn sm hidden" id="selExport">导出所选</button>
      <button class="btn ghost sm hidden" id="selCancel">取消</button>
      <span class="scount" id="selCount"></span>
    </div>
    <div id="histList"></div>
  </section>

  <!-- ===== 模板页 ===== -->
  <section id="page-tpl" class="hidden">
    <div class="card">
      <h2>训练模板</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        把一套常练的动作存成模板，一键复制到某天的训练，再边练边打钩。
      </p>
      <button class="btn" id="newTplBtn">+ 新建模板</button>
    </div>
    <div id="tplList"></div>
  </section>

  <!-- ===== 数据页 ===== -->
  <section id="page-data" class="hidden">
    <div class="card">
      <h2>导出 / 备份</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        导出后可直接把内容粘贴给大模型分析，或保存为文件备份。
      </p>
      <div class="toolbar">
        <button class="btn" id="expMd">复制 Markdown</button>
        <button class="btn ghost" id="expJson">复制 JSON</button>
        <button class="btn ghost" id="dlJson">下载 JSON 备份</button>
        <button class="btn ghost" id="dlCsv">下载 CSV</button>
      </div>
    </div>
    <div class="card">
      <h2>导入 / 恢复</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 12px">
        选择之前下载的 JSON 备份文件即可恢复（会覆盖当前数据）。
      </p>
      <input type="file" id="impFile" accept="application/json,.json">
    </div>
    <div class="card">
      <h2>统计</h2>
      <div id="statBox" style="font-size:14px;color:var(--sub);line-height:1.8"></div>
      <button class="btn danger" id="clearAll" style="margin-top:14px">清空全部数据</button>
    </div>
  </section>
</div>

<nav class="tabbar">
  <button data-page="log" class="active"><span class="ic">📝</span>记录</button>
  <button data-page="tpl"><span class="ic">📋</span>模板</button>
  <button data-page="hist"><span class="ic">📚</span>历史</button>
  <button data-page="data"><span class="ic">📤</span>数据</button>
</nav>

<!-- 组间休息倒计时 -->
<div id="restBar" class="rest-bar">
  <div class="rt-top">
    <div>
      <div class="rt-lbl" id="restLbl">组间休息</div>
      <div class="rt-time" id="restTime">60</div>
    </div>
    <button class="btn ghost sm" id="restSkip">跳过</button>
  </div>
  <div class="rest-prog"><div id="restProg"></div></div>
  <div class="rt-btns">
    <button class="btn ghost sm" id="restMinus">-15s</button>
    <button class="btn ghost sm" id="restPlus">+15s</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- 文本导出弹窗 -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modalTitle">导出内容</h3>
    <textarea id="modalText" readonly></textarea>
    <div class="toolbar" style="margin-top:12px">
      <button class="btn" id="modalCopy">复制到剪贴板</button>
      <button class="btn ghost" id="modalClose">关闭</button>
    </div>
  </div>
</div>

<!-- 模板编辑弹窗 -->
<div id="tplModalBg" class="modal-bg hidden">
  <div class="modal">
    <h3 id="tplModalTitle">新建模板</h3>
    <div class="field">
      <label>模板名称</label>
      <input id="tplName" placeholder="如：胸 + 三头日" autocomplete="off">
    </div>
    <label>动作（动作名 · 组数 · 组间休息秒）</label>
    <div id="tplExBox"></div>
    <button class="add-set" id="tplAddEx">+ 增加动作</button>
    <div class="toolbar" style="margin-top:14px">
      <button class="btn green" id="tplSave">保存模板</button>
      <button class="btn ghost" id="tplCancel">取消</button>
    </div>
  </div>
</div>

<!-- 动作编辑弹窗 -->
<div id="exModalBg" class="modal-bg hidden">
  <div class="modal">
    <h3>编辑动作</h3>
    <div class="field">
      <label>动作名称</label>
      <input id="edExName" list="exList" placeholder="如：杠铃卧推" autocomplete="off">
    </div>
    <label>组数（重量 kg × 次数 · 组间休息秒）</label>
    <div class="sets" id="edSetsBox"></div>
    <button class="add-set" id="edAddSet">+ 增加一组</button>
    <div class="field" style="margin-top:12px">
      <label>备注</label>
      <textarea id="edExNote" placeholder="RPE / 状态 / 感受"></textarea>
    </div>
    <div class="toolbar" style="margin-top:14px">
      <button class="btn green" id="edExSave">保存修改</button>
      <button class="btn ghost" id="edExCancel">取消</button>
    </div>
  </div>
</div>

<!-- 训练编辑弹窗 -->
<div id="sessModalBg" class="modal-bg hidden">
  <div class="modal">
    <h3>编辑这次训练</h3>
    <div class="field">
      <label>训练名称（如：胸 + 三头）</label>
      <input id="edSessTitle" placeholder="给这次训练起个名" autocomplete="off">
    </div>
    <div class="field">
      <label>训练日期</label>
      <input id="edSessDate" type="date">
    </div>
    <div class="field">
      <label>整体备注</label>
      <textarea id="edSessNote" placeholder="今天整体状态、训练目标等"></textarea>
    </div>
    <div class="toolbar" style="margin-top:14px">
      <button class="btn green" id="edSessSave">保存</button>
      <button class="btn ghost" id="edSessCancel">取消</button>
    </div>
    <button class="btn danger" id="edSessDelete" style="margin-top:10px">删除整次训练</button>
  </div>
</div>

<script>
/* ========= 存储层 ========= */
const KEY = 'fitlog_v1';
function load(){ try{ const d=JSON.parse(localStorage.getItem(KEY))||{}; if(!Array.isArray(d.entries))d.entries=[]; if(!Array.isArray(d.templates))d.templates=[]; if(!d.sessions||typeof d.sessions!=='object')d.sessions={}; return d; }catch(e){ return {entries:[],templates:[],sessions:{}}; } }
function save(db){ localStorage.setItem(KEY, JSON.stringify(db)); }
let DB = load();

/* entry: {id, date:'YYYY-MM-DD', name, sets:[{w,r,rest,done}], note, ts} */
/* template: {id, name, exercises:[{name, count, rest}], ts} */
/* sessions: { 'YYYY-MM-DD': {title, note} }  —— 一天即一次训练的元信息 */
function getSession(date){ return DB.sessions[date] || {title:'',note:''}; }
function setSession(date, obj){
  const cur=getSession(date); const next={...cur,...obj};
  if(!next.title && !next.note) delete DB.sessions[date];
  else DB.sessions[date]=next;
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(d){ d=d||new Date(); const z=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }

/* ========= 通用 UI ========= */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }

const curDate = document.getElementById('curDate');
curDate.value = todayStr();
curDate.addEventListener('change', ()=>{ renderToday(); });

/* ========= 组数编辑 ========= */
function setRow(s={w:'',r:'',rest:''}, idx=0){
  const div=document.createElement('div'); div.className='set-row';
  div.innerHTML=`
    <span class="idx">${idx+1}</span>
    <input class="w" type="number" inputmode="decimal" placeholder="kg" value="${s.w}">
    <input class="r" type="number" inputmode="numeric" placeholder="次" value="${s.r}">
    <input class="rest" type="number" inputmode="numeric" placeholder="休息s" value="${s.rest}">
    <button class="x" title="删除">×</button>`;
  div.querySelector('.x').onclick=()=>{ div.remove(); reindexSets(); };
  return div;
}
function reindexSets(){ [...document.querySelectorAll('#setsBox .set-row .idx')]
  .forEach((el,i)=>el.textContent=i+1); }
const setsBox=document.getElementById('setsBox');
function resetSets(){ setsBox.innerHTML=''; setsBox.appendChild(setRow({w:'',r:'',rest:''},0)); }
document.getElementById('addSetBtn').onclick=()=>{
  const rows=setsBox.children; const n=rows.length;
  let prev={w:'',r:'',rest:''};
  if(n){ const last=rows[n-1];
    prev={ w:last.querySelector('.w').value, r:last.querySelector('.r').value, rest:last.querySelector('.rest').value }; }
  setsBox.appendChild(setRow(prev,n)); };
resetSets();

/* 常用动作建议 */
function refreshSuggest(){
  const names=[...new Set(DB.entries.map(e=>e.name))];
  const dl=document.getElementById('exList'); dl.innerHTML=names.map(n=>`<option value="${n}">`).join('');
  const common=['杠铃卧推','深蹲','硬拉','引体向上','坐姿划船','哑铃飞鸟','肩上推举','二头弯举','腿举','卷腹'];
  const merged=[...new Set([...names,...common])].slice(0,10);
  document.getElementById('exSuggest').innerHTML=merged.map(n=>`<span class="tag" data-n="${n}">${n}</span>`).join('');
  document.querySelectorAll('#exSuggest .tag').forEach(t=>t.onclick=()=>{
    document.getElementById('exName').value=t.dataset.n; });
}

/* ========= 保存动作 ========= */
document.getElementById('saveExBtn').onclick=()=>{
  const name=document.getElementById('exName').value.trim();
  if(!name){ toast('请填写动作名称'); return; }
  const sets=[...document.querySelectorAll('#setsBox .set-row')].map(row=>({

  })).filter(s=>s.w||s.r);

/* ========= 一次训练（按天）卡片 ========= */
function sessionStat(list){
  let vol=0,sets=0,doneSets=0;
  list.forEach(e=>{ sets+=e.sets.length; vol+=e.sets.reduce((a,s)=>a+s.w*s.r,0); doneSets+=e.sets.filter(s=>s.done).length; });
  return {vol,sets,doneSets};
}
function sessionHeader(date, list, opts={}){
  const s=getSession(date); const st=sessionStat(list);
  const head=document.createElement('div'); head.className='sess';
  head.innerHTML=`
    <div class="s-top">
      <div>
        <div class="s-title">${s.title? s.title : '一次训练'}</div>
        <div class="s-date">📅 ${date}</div>
      </div>
      <button class="btn ghost sm" data-sedit>编辑训练</button>
    </div>
    <div class="s-stat">${list.length} 个动作 · ${st.sets} 组 · 容量 ${st.vol.toFixed(0)} kg${opts.showDone?` · 已完成 ${st.doneSets}/${st.sets} 组`:''}</div>
    ${s.note?`<div class="s-note">📝 ${s.note}</div>`:''}`;
  head.querySelector('[data-sedit]').onclick=()=>openSessModal(date);
  return head;
}

/* ========= 渲染今天 ========= */
function fmtSet(s){ let t=`${s.w}kg×${s.r}`; if(s.rest) t+=` (休${s.rest}s)`; return t; }
function entryCard(e, interactive){
  const div=document.createElement('div'); div.className='entry';
  const vol=e.sets.reduce((a,s)=>a+s.w*s.r,0);
  const doneN=e.sets.filter(s=>s.done).length;
  div.innerHTML=`
    <div class="top">
      <div>
        <div class="name">${e.name}</div>
        <div class="meta">${e.sets.length} 组 · 容量 ${vol.toFixed(0)} kg${interactive?` · 已完成 ${doneN}/${e.sets.length}`:''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn ghost sm" data-edit="${e.id}">编辑</button>
        <button class="btn danger sm" data-del="${e.id}">删除</button>
      </div>
    </div>
    ${interactive
      ? `<div class="sets-ck">${e.sets.map((s,i)=>`
          <label class="setck${s.done?' done':''}" data-i="${i}">
            <input type="checkbox" ${s.done?'checked':''}>
            <span class="si">${i+1}</span>
            <span class="sv">${s.w}kg × ${s.r}</span>
            <span class="sr">${s.rest?`休 ${s.rest}s`:''}</span>
          </label>`).join('')}</div>`
      : `<div class="setline">${e.sets.map(s=>`<span class="tag">${fmtSet(s)}</span>`).join('')}</div>`}
    ${e.note?`<div class="note">📌 ${e.note}</div>`:''}`;
  div.querySelector('[data-del]').onclick=()=>{
    if(confirm('删除「'+e.name+'」这条记录？')){
      DB.entries=DB.entries.filter(x=>x.id!==e.id); save(DB); renderToday(); renderHist(); }
  };

    div.querySelectorAll('.setck').forEach(lbl=>{

/* ========= 导出 ========= */
function toMarkdown(daysFilter){
  let entries=DB.entries;
  if(daysFilter && daysFilter.length) entries=entries.filter(e=>daysFilter.includes(e.date));
  if(!entries.length) return '（暂无数据）';
  const byDay={}; entries.forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });
  let md='# 健身训练记录\n\n';
  Object.keys(byDay).sort().forEach(d=>{
    const list=byDay[d].sort((a,b)=>a.ts-b.ts);
    let vol=0,sc=0; list.forEach(e=>{ sc+=e.sets.length; vol+=e.sets.reduce((a,s)=>a+s.w*s.r,0); });
    const s=getSession(d);
    const title=s.title? `${s.title}（${d}）` : d;
    md+=`## ${title}\n\n`;
    md+=`> ${list.length} 个动作，${sc} 组，总容量 ${vol.toFixed(0)} kg\n`;
    if(s.note) md+=`> 整体备注：${s.note}\n`;
    md+='\n';
    list.forEach(e=>{
      md+=`### ${e.name}\n`;
      e.sets.forEach((s,i)=>{
        md+=`- 第${i+1}组：${s.w} kg × ${s.r} 次`;
        if(s.rest) md+=`，组间休息 ${s.rest}s`;
        if(s.done) md+=`（已完成）`;
        md+='\n';
      });
      if(e.note) md+=`- 备注：${e.note}\n`;
      md+='\n';
    });
  });
  return md;
}
function toCsv(){
  const rows=[['date','exercise','set_index','weight_kg','reps','rest_sec','note']];
  DB.entries.sort((a,b)=>a.date.localeCompare(b.date)||a.ts-b.ts).forEach(e=>{
    e.sets.forEach((s,i)=>rows.push([e.date,e.name,i+1,s.w,s.r,s.rest,(e.note||'').replace(/"/g,'""')]));
  });
  return rows.map(r=>r.map(c=>/[",\n]/.test(String(c))?`"${c}"`:c).join(',')).join('\n');
}
function download(filename,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function copyText(text,okMsg){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(okMsg||'已复制 ✓')).catch(()=>showModal('复制内容',text));
  } else showModal('复制内容',text);
}

/* ========= 组间休息倒计时 ========= */
let restTimer=null, restTotal=0, restLeft=0;
const restBar=document.getElementById('restBar');
function fmtTime(s){ const m=Math.floor(s/60), x=s%60; return m>0?`${m}:${String(x).padStart(2,'0')}`:String(s); }
function paintRest(){
  document.getElementById('restTime').textContent=fmtTime(Math.max(0,restLeft));
  document.getElementById('restProg').style.width=(restTotal?Math.max(0,restLeft)/restTotal*100:0)+'%';
}
function startRest(sec, label){
  restTotal=sec; restLeft=sec;
  document.getElementById('restLbl').textContent=label||'组间休息';
  restBar.classList.add('show'); paintRest();
  clearInterval(restTimer);
  restTimer=setInterval(()=>{
    restLeft--; paintRest();
    if(restLeft<=0){ stopRest(); beep(); toast('休息结束，继续下一组 💪'); }
  },1000);
}
function stopRest(){ clearInterval(restTimer); restTimer=null; restBar.classList.remove('show'); }
function beep(){
  try{ const a=new (window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination); o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(.001,a.currentTime); g.gain.exponentialRampToValueAtTime(.3,a.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);
    o.start(); o.stop(a.currentTime+.55);
    if(navigator.vibrate) navigator.vibrate(200);
  }catch(e){}
}
document.getElementById('restSkip').onclick=stopRest;
document.getElementById('restPlus').onclick=()=>{ restLeft+=15; restTotal=Math.max(restTotal,restLeft); paintRest(); };
document.getElementById('restMinus').onclick=()=>{ restLeft=Math.max(1,restLeft-15); paintRest(); };

  document.getElementById('edSessDate').value=date;
  document.getElementById('edSessNote').value=s.note||'';
  sessModalBg.classList.remove('hidden');
}
document.getElementById('edSessCancel').onclick=()=>sessModalBg.classList.add('hidden');
document.getElementById('edSessSave').onclick=()=>{
  const oldDate=editingSessDate;
  const title=document.getElementById('edSessTitle').value.trim();
  const note=document.getElementById('edSessNote').value.trim();
  const newDate=document.getElementById('edSessDate').value||oldDate;
  if(newDate!==oldDate){
    // 把这天所有动作迁移到新日期
    DB.entries.forEach(e=>{ if(e.date===oldDate) e.date=newDate; });
    const old=DB.sessions[oldDate]; if(old){ delete DB.sessions[oldDate]; }
  }
  // 写入新日期的元信息（先清旧再设）
  DB.sessions[newDate]={title,note};
  if(!title && !note) delete DB.sessions[newDate];
  save(DB);
  sessModalBg.classList.add('hidden');
  if(newDate!==oldDate) curDate.value=newDate;
  renderToday(); renderHist();
  toast('训练已更新 ✓');
};
document.getElementById('edSessDelete').onclick=()=>{
  const d=editingSessDate;
  const n=DB.entries.filter(e=>e.date===d).length;
  if(!confirm(`删除 ${d} 这次训练？将移除该天全部 ${n} 个动作，且不可恢复。`)) return;
  DB.entries=DB.entries.filter(e=>e.date!==d);
  delete DB.sessions[d];
  save(DB); sessModalBg.classList.add('hidden');
  renderToday(); renderHist(); toast('已删除整次训练');
};

/* ========= 启动 ========= */
refreshSuggest(); renderToday();

/* ========= Service Worker（离线） ========= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
